<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You 💕</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { overflow:hidden; background:#0a0010; font-family:Georgia,serif; }

    /* ── Start overlay ─────────────────────────────── */
    #start-overlay {
      position:fixed; inset:0;
      background:rgba(10,0,16,0.9);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:14px;
      z-index:20; transition:opacity .5s;
    }
    #start-overlay h1 { color:#ff9ec4; font-size:2rem; letter-spacing:.1em; text-shadow:0 0 24px #ff69b4; }
    #start-overlay ul {
      list-style:none; color:rgba(255,200,220,.8);
      font-size:.9rem; line-height:2; letter-spacing:.05em; text-align:center;
    }
    #start-overlay ul li span { color:#ffcc88; font-weight:bold; }
    #start-overlay button {
      margin-top:10px; padding:11px 34px;
      background:transparent; border:1.5px solid #ff69b4;
      color:#ff9ec4; font-family:Georgia,serif; font-size:1rem;
      letter-spacing:.12em; cursor:pointer; transition:background .2s,color .2s;
    }
    #start-overlay button:hover { background:#ff69b420; color:#fff; }

    /* ── ESC hint (shown while reading a letter) ───── */
    #esc-hint {
      position:fixed; bottom:26px; left:50%; transform:translateX(-50%);
      color:rgba(255,200,220,.9); font-size:.82rem; letter-spacing:.07em;
      background:rgba(0,0,0,.5); padding:6px 22px; border-radius:20px;
      pointer-events:none; opacity:0; transition:opacity .35s;
    }

    /* ── Controls hint (bottom-right, always visible) ─ */
    #controls {
      position:fixed; bottom:18px; right:18px;
      color:rgba(255,180,210,.5); font-size:.75rem; line-height:1.7;
      letter-spacing:.05em; text-align:right; pointer-events:none;
      display:none;
    }

    /* ── Crosshair ─────────────────────────────────── */
    #crosshair {
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:14px; height:14px; pointer-events:none; display:none;
    }
    #crosshair::before,#crosshair::after {
      content:''; position:absolute; background:rgba(255,200,220,.7);
    }
    #crosshair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
    #crosshair::after  { height:2px; width:100%; top:50%;  transform:translateY(-50%); }
  </style>
</head>
<body>

  <div id="start-overlay">
    <h1>💕 For You 💕</h1>
    <ul>
      <li><span>W A S D</span> — walk around</li>
      <li><span>Mouse</span> — look around</li>
      <li><span>Click</span> an envelope to read it</li>
      <li><span>ESC</span> — put the letter back</li>
    </ul>
    <button id="start-btn">Click to Start</button>
  </div>

  <div id="esc-hint">Press ESC to put the letter back</div>
  <div id="crosshair"></div>

  <div id="controls">
    WASD · move &nbsp;|&nbsp; Mouse · look &nbsp;|&nbsp; Click · read letter &nbsp;|&nbsp; ESC · put back
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="script.js"></script>
  <script>
    document.getElementById('start-btn').addEventListener('click', () => {
      const ov = document.getElementById('start-overlay');
      ov.style.opacity = '0';
      setTimeout(() => ov.style.display = 'none', 500);
      const canvas = window.threeCanvas || document.querySelector('canvas');
      if (canvas) canvas.requestPointerLock();
    });

    document.addEventListener('pointerlockchange', () => {
      const locked = !!document.pointerLockElement;
      document.getElementById('crosshair').style.display = locked ? 'block' : 'none';
      document.getElementById('controls').style.display  = locked ? 'block' : 'none';
    });
  </script>
</body>
</html>
