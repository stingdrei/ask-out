<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You 💕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0010; font-family: Georgia, serif; }

    /* Click-to-start overlay */
    #start-overlay {
      position: fixed; inset: 0;
      background: rgba(10, 0, 16, 0.88);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 10;
      transition: opacity 0.5s;
    }
    #start-overlay h1 {
      color: #ff9ec4; font-size: 2rem; letter-spacing: 0.1em;
      text-shadow: 0 0 20px #ff69b4;
    }
    #start-overlay p  { color: rgba(255,200,220,0.75); font-size: 0.95rem; letter-spacing: 0.06em; }
    #start-overlay button {
      margin-top: 12px;
      padding: 12px 32px;
      background: transparent;
      border: 1.5px solid #ff69b4;
      color: #ff9ec4;
      font-family: Georgia, serif;
      font-size: 1rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    #start-overlay button:hover { background: #ff69b420; color: #fff; }

    /* ESC hint — shown only while inspecting a letter */
    #esc-hint {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,200,220,0.85);
      font-size: 0.85rem; letter-spacing: 0.08em;
      background: rgba(0,0,0,0.45);
      padding: 6px 20px; border-radius: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }

    /* crosshair */
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 14px; height: 14px;
      pointer-events: none; opacity: 0.55;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute;
      background: rgba(255,200,220,0.8);
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { height: 2px; width: 100%; top: 50%;  transform: translateY(-50%); }
  </style>
</head>
<body>

  <!-- Click to lock mouse and start -->
  <div id="start-overlay">
    <h1>💕 For You 💕</h1>
    <p>Look around freely · Click the <b>Y · E · S</b> blocks on the table · Press <b>ESC</b> to go back</p>
    <button id="start-btn">Click to Start</button>
  </div>

  <!-- Crosshair (shown after pointer lock) -->
  <div id="crosshair" style="display:none"></div>

  <!-- ESC hint while inspecting -->
  <div id="esc-hint">Press ESC to place it back</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="script.js"></script>

  <script>
    // Start button — requests pointer lock on the Three.js canvas
    document.getElementById('start-btn').addEventListener('click', () => {
      const overlay = document.getElementById('start-overlay');
      overlay.style.opacity = '0';
      setTimeout(() => overlay.style.display = 'none', 500);

      // window.threeCanvas is set by script.js after renderer is created
      const canvas = window.threeCanvas || document.querySelector('canvas');
      if (canvas) {
        canvas.requestPointerLock();
      }
    });

    // Show/hide crosshair based on pointer lock state
    document.addEventListener('pointerlockchange', () => {
      const locked = !!document.pointerLockElement;
      document.getElementById('crosshair').style.display = locked ? 'block' : 'none';
    });
  </script>
</body>
</html>
