<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You 💕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0010; }

    #hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 180, 220, 0.75);
      font-family: Georgia, serif;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-align: center;
      pointer-events: none;
      animation: fadeHint 4s ease forwards;
      animation-delay: 2s;
      opacity: 0;
    }
    @keyframes fadeHint {
      0%   { opacity: 0; }
      15%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

  <div id="hint">
    🖱️ Drag to orbit 360° &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Click the Y / E / S blocks for fireworks
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
